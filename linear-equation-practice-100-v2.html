let quiz=[],idx=0,score=0,answered=false,records=[],startedAt=null;
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
function makeChoices(ans){const correct=String(ans);let vals=new Set([correct]);let num=Number(correct);let cand=[];if(Number.isInteger(num)){cand=[num-5,num-3,num-2,num-1,num+1,num+2,num+3,num+5,-num,0,1,-1,10,-10].map(String)}else{cand=["0","1","-1","2","-2","3","-3","1/2","-1/2","2/3","-2/3","3/2","-3/2"]}for(const v of shuffle(cand)){if(v!==correct) vals.add(v); if(vals.size>=4) break}while(vals.size<4) vals.add(String(Math.floor(Math.random()*21)-10));return shuffle([...vals]).slice(0,4)}
function startQuiz(){if(!document.getElementById('name').value.trim()){alert('이름을 입력해 주세요.');return}quiz=shuffle(PROBLEMS).slice(0,15).map(p=>({...p,choices:makeChoices(p.a)}));idx=0;score=0;answered=false;records=[];startedAt=new Date();document.getElementById('result').style.display='none';render()}
function renderStats(){document.getElementById('now').textContent=quiz.length?Math.min(idx+1,quiz.length):0;document.getElementById('total').textContent=quiz.length;document.getElementById('score').textContent=score;document.getElementById('percent').textContent=quiz.length?Math.round(score/quiz.length*100)+'%':'0%'}
function render(){renderStats();if(idx>=quiz.length){showResult();return}const p=quiz[idx];document.querySelector('#quizCard .tag').textContent=p.level+' · '+p.id;document.querySelector('#quizCard .q').textContent='Q'+(idx+1)+'. '+p.q;const box=document.getElementById('choices');box.innerHTML='';document.getElementById('explain').style.display='none';p.choices.forEach(ch=>{const btn=document.createElement('button');btn.className='choice';btn.textContent=ch;btn.onclick=()=>choose(ch,btn);box.appendChild(btn)});answered=false}
function choose(ch,btn){if(answered)return;answered=true;const p=quiz[idx], correct=String(p.a);document.querySelectorAll('.choice').forEach(b=>{if(b.textContent===correct)b.classList.add('correct')});if(ch!==correct)btn.classList.add('wrong');if(ch===correct)score++;records.push({id:p.id,level:p.level,q:p.q,my:ch,answer:correct,ok:ch===correct,explain:p.e});const ex=document.getElementById('explain');ex.style.display='block';ex.innerHTML='<b>'+(ch===correct?'정답입니다!':'다시 확인해 봅시다.')+'</b><br>'+p.e;renderStats()}
function nextQuestion(){if(!quiz.length)return;if(!answered){alert('먼저 답을 선택해 주세요.');return}idx++;render()}
function showResult(){if(!quiz.length)return;const percent=Math.round(score/quiz.length*100),result=document.getElementById('result');result.style.display='block';result.innerHTML='<h2>퀴즈 결과</h2><p><b>'+score+' / '+quiz.length+'문항 정답</b> · 정답률 '+percent+'%</p><button class="primary" onclick="submitResult()">결과 제출하기</button><div class="small" id="submitStatus">아직 제출하지 않았습니다.</div><h3>오답 및 풀이 확인</h3>';records.forEach((r,i)=>{result.innerHTML+='<div class="review"><b>Q'+(i+1)+'. '+r.q+'</b><br>나의 답: '+r.my+' / 정답: '+r.answer+'<br>'+r.explain+'</div>'});result.scrollIntoView({behavior:'smooth'})}
async function submitResult(){const status=document.getElementById('submitStatus');const payload={timestamp:new Date().toISOString(),recordType:'quiz_result',activity:UNIT_NAME,mode:MODE_NAME,grade:document.getElementById('grade').value.trim(),classNo:document.getElementById('classNo').value.trim(),number:document.getElementById('number').value.trim(),name:document.getElementById('name').value.trim(),score:score,total:quiz.length,percent:quiz.length?Math.round(score/quiz.length*100):0,wrongCount:records.filter(r=>!r.ok).length,details:records.map((r,i)=>'Q'+(i+1)+' '+r.id+' '+r.q+' / 나의답: '+r.my+' / 정답: '+r.answer+' / '+(r.ok?'O':'X')).join('\n'),userAgent:navigator.userAgent,pageUrl:location.href};status.textContent='제출 중입니다...';try{await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});status.textContent='제출되었습니다. 구글시트에서 확인할 수 있습니다.'}catch(e){status.textContent='제출 실패: 인터넷 연결 또는 Apps Script 주소를 확인해 주세요.'}}
renderStats();
