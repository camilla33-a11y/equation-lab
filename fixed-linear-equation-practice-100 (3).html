<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일차방정식 연습 퀴즈 100문항</title>
<style>
:root{--primary:#2563eb;--good:#15803d;--bad:#b91c1c;--muted:#667085;--border:#e5e7eb;--soft:#eff6ff}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#eff6ff,#fff7ed);padding:18px;color:#202124}
.app{max-width:960px;margin:auto}.card{background:white;border-radius:22px;padding:22px;margin:14px 0;box-shadow:0 10px 28px rgba(0,0,0,.10)}
h1{margin:0 0 8px;color:#1d4ed8}.sub{color:var(--muted);line-height:1.6}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
input,select{padding:12px;border:1px solid var(--border);border-radius:12px;font-size:15px;width:100%;background:white}
button{border:0;border-radius:14px;padding:12px 16px;margin:5px;font-weight:800;font-size:15px;cursor:pointer}
.primary{background:var(--primary);color:#fff}.gray{background:#f3f4f6;color:#374151}.choice{display:block;width:100%;text-align:left;background:#f9fafb;border:2px solid var(--border);margin:8px 0;color:#111}
.choice.correct{border-color:#22c55e;background:#ecfdf5;color:var(--good)}.choice.wrong{border-color:#ef4444;background:#fef2f2;color:var(--bad)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#fff;border-radius:16px;padding:14px;text-align:center;box-shadow:0 6px 16px rgba(0,0,0,.08)}.stat b{font-size:24px;display:block}.q{font-size:28px;font-weight:900;text-align:center;margin:16px 0}.tag{display:inline-block;background:#dbeafe;color:#1d4ed8;padding:6px 10px;border-radius:999px;font-weight:800;font-size:13px}
.explain{display:none;background:#f8fafc;border:1px solid var(--border);border-radius:14px;padding:14px;line-height:1.7;margin-top:12px}.result{display:none}.small{font-size:14px;color:var(--muted);line-height:1.6}.review{border-top:1px solid var(--border);padding:12px 0;line-height:1.6}
@media(max-width:760px){body{padding:12px}.grid,.stats{grid-template-columns:repeat(2,1fr)}.q{font-size:22px}}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>일차방정식 연습 퀴즈 100문항</h1>
    <p class="sub">문제은행 <b>100문항</b> 중 매번 <b>15문항</b>을 무작위로 출제합니다. 학년·반·번호·이름을 입력하면 결과가 구글시트에 저장됩니다.</p>
    <div class="grid">
      <input id="grade" placeholder="학년 예: 1">
      <input id="classNo" placeholder="반 예: 1">
      <input id="number" placeholder="번호 예: 7">
      <input id="name" placeholder="이름">
    </div>
    <p class="small">※ 이름을 입력하고 시작하면 대시보드에서 참여 여부를 확인할 수 있습니다.</p>
    <button class="primary" onclick="startQuiz()">랜덤 15문항 시작</button>
    <button class="gray" onclick="showResult()">결과 보기</button>
  </div>
  <div class="stats">
    <div class="stat"><b id="now">0</b>현재</div><div class="stat"><b id="total">0</b>전체</div><div class="stat"><b id="score">0</b>정답</div><div class="stat"><b id="percent">0%</b>정답률</div>
  </div>
  <div class="card" id="quizCard">
    <span class="tag" id="tag">준비</span>
    <div class="q" id="question">시작 버튼을 눌러 주세요.</div>
    <div id="choices"></div>
    <div class="explain" id="explain"></div>
    <button class="primary" onclick="nextQuestion()">다음 문제</button>
  </div>
  <div class="card result" id="result"></div>
</div>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXIr_ux4geEWjMATsJx9sVOqN47hgHkzxqzmBi6v9HxfxyNNLRzpXRbrusxdDc7vlb/exec";
const ACTIVITY_NAME = "일차방정식 연습 퀴즈 100문항";
const RECORD_TYPE = "quiz_result";
let bank=[], quiz=[], idx=0, score=0, answered=false, records=[], startedAt=null;
function fmt(n){return n<0?'('+n+')':String(n)}
function sign(n){return n>=0?' + '+n:' - '+Math.abs(n)}
function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5)}
function choices(ans){let ds=[ans,ans+1,ans-1,ans+2,ans-2,-ans,ans+3,ans-3].filter((v,i,a)=>a.indexOf(v)===i); return shuffle(ds).slice(0,4).includes(ans)?shuffle(ds).slice(0,4):shuffle([ans,...ds]).slice(0,4)}
function add(id,cat,level,q,ans,explain){bank.push({id,cat,level,q,ans,choices:choices(ans),explain})}

(function(){
let id=1;
for(let x=1;x<=20;x++){ let b=(x%9)+2; add('P'+String(id++).padStart(3,'0'),'x+a=b','기초',`x${sign(b)} = ${x+b}`,x,`양쪽에서 ${b}를 빼면 x = ${x} 입니다.`)}
for(let x=1;x<=20;x++){ let b=(x%8)+2; add('P'+String(id++).padStart(3,'0'),'x-a=b','기초',`x - ${b} = ${x-b}`,x,`양쪽에 ${b}를 더하면 x = ${x} 입니다.`)}
for(let x=1;x<=20;x++){ let a=(x%8)+2; add('P'+String(id++).padStart(3,'0'),'ax=b','보통',`${a}x = ${a*x}`,x,`양쪽을 ${a}로 나누면 x = ${x} 입니다.`)}
for(let x=1;x<=20;x++){ let a=(x%8)+2, b=(x%10)+1; add('P'+String(id++).padStart(3,'0'),'ax+a=b','보통',`${a}x${sign(b)} = ${a*x+b}`,x,`양쪽에서 ${b}를 빼면 ${a}x=${a*x}, 양쪽을 ${a}로 나누면 x=${x} 입니다.`)}
for(let x=1;x<=20;x++){ let a=(x%8)+2, b=(x%10)+1; add('P'+String(id++).padStart(3,'0'),'ax-a=b','도전',`${a}x - ${b} = ${a*x-b}`,x,`양쪽에 ${b}를 더하면 ${a}x=${a*x}, 양쪽을 ${a}로 나누면 x=${x} 입니다.`)}
})();

function validateStudent(){if(!document.getElementById('name').value.trim()){alert('이름을 입력해 주세요.');return false} return true}
function startQuiz(){if(!validateStudent()) return; quiz=shuffle(bank).slice(0,15); idx=0; score=0; records=[]; answered=false; startedAt=new Date(); document.getElementById('result').style.display='none'; renderQuestion();}
function renderStats(){document.getElementById('now').textContent=quiz.length?Math.min(idx+1,quiz.length):0;document.getElementById('total').textContent=quiz.length;document.getElementById('score').textContent=score;document.getElementById('percent').textContent=quiz.length?Math.round(score/quiz.length*100)+'%':'0%'}
function renderQuestion(){renderStats(); if(idx>=quiz.length){showResult();return} const item=quiz[idx]; answered=false; document.getElementById('tag').textContent=item.cat+' · '+item.level+' · '+item.id; document.getElementById('question').innerHTML='Q'+(idx+1)+'. '+item.q; const box=document.getElementById('choices'); box.innerHTML=''; document.getElementById('explain').style.display='none'; item.choices.forEach((c,i)=>{const btn=document.createElement('button');btn.className='choice';btn.textContent=(i+1)+'. x = '+c;btn.onclick=()=>choose(c,btn);box.appendChild(btn)})}
function choose(c,btn){if(answered)return; answered=true; const item=quiz[idx]; document.querySelectorAll('.choice').forEach(b=>{if(b.textContent.endsWith('= '+item.ans)) b.classList.add('correct')}); if(c!==item.ans) btn.classList.add('wrong'); if(c===item.ans) score++; records.push({id:item.id,cat:item.cat,level:item.level,q:item.q,my:c,answer:item.ans,ok:c===item.ans,explain:item.explain}); const ex=document.getElementById('explain'); ex.style.display='block'; ex.innerHTML='<b>'+(c===item.ans?'정답입니다!':'다시 확인해 봅시다.')+'</b><br>'+item.explain; renderStats();}
function nextQuestion(){if(!quiz.length)return; if(!answered){alert('먼저 답을 선택해 주세요.');return} idx++; renderQuestion();}
function showResult(){if(!quiz.length){alert('먼저 퀴즈를 시작해 주세요.');return} const percent=Math.round(score/quiz.length*100); const result=document.getElementById('result'); result.style.display='block'; let msg=percent>=90?'아주 잘했습니다!':percent>=70?'좋습니다. 오답만 다시 확인해 봅시다.':'기본 풀이 순서를 다시 연습해 봅시다.'; result.innerHTML='<h2>퀴즈 결과</h2><p><b>'+score+' / '+quiz.length+'문항</b> · 정답률 '+percent+'%</p><p>'+msg+'</p><button class="primary" onclick="submitResult()">구글시트에 결과 제출</button><div class="small" id="submitStatus">아직 제출하지 않았습니다.</div><h3>오답 복습</h3>'; records.forEach((r,i)=>{if(!r.ok) result.innerHTML+='<div class="review"><b>Q'+(i+1)+'. '+r.q+'</b><br>나의 답: x='+r.my+' / 정답: x='+r.answer+'<br>'+r.explain+'</div>'}); result.scrollIntoView({behavior:'smooth'})}
async function submitResult(){const status=document.getElementById('submitStatus'); const payload={timestamp:new Date().toISOString(),recordType:RECORD_TYPE,activityName:ACTIVITY_NAME,unitMode:ACTIVITY_NAME,grade:document.getElementById('grade').value.trim(),classNo:document.getElementById('classNo').value.trim(),number:document.getElementById('number').value.trim(),name:document.getElementById('name').value.trim(),score:score,total:quiz.length,percent:quiz.length?Math.round(score/quiz.length*100):0,wrongCount:records.filter(r=>!r.ok).length,startedAt:startedAt?startedAt.toISOString():'',finishedAt:new Date().toISOString(),pageUrl:location.href,userAgent:navigator.userAgent,questionIds:records.map(r=>r.id).join(', '),wrongIds:records.filter(r=>!r.ok).map(r=>!r.ok?r.id:'').filter(Boolean).join(', '),details:records.map((r,i)=>'Q'+(i+1)+' '+r.id+' ['+r.cat+'/'+r.level+'] '+r.q+' / 나의 답: x='+r.my+' / 정답: x='+r.answer+' / '+(r.ok?'O':'X')).join('\n')}; status.textContent='제출 중입니다...'; try{await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}); status.textContent='제출되었습니다. 구글시트에서 확인해 주세요.'}catch(e){status.textContent='제출 실패: Apps Script 주소 또는 인터넷 연결을 확인해 주세요.'}}
renderStats();
</script>
</body>
</html>
