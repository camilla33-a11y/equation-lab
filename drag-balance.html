<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>등식의 성질 드래그 저울게임</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(#eaf6ff,#fff);
  text-align:center;
  color:#24364b;
}
.container{
  max-width:760px;
  margin:auto;
  padding:16px;
}
h1{color:#24527a;}
.card{
  background:white;
  border-radius:20px;
  padding:16px;
  margin:14px 0;
  box-shadow:0 4px 14px rgba(0,0,0,.12);
}
.equation{
  font-size:32px;
  font-weight:bold;
  margin:10px;
}
.scale{
  position:relative;
  height:260px;
  max-width:460px;
  margin:auto;
}
.beam{
  position:absolute;
  top:85px;
  left:50%;
  width:350px;
  height:14px;
  margin-left:-175px;
  background:#555;
  border-radius:10px;
  transform-origin:center;
  transition:.5s;
}
.pillar{
  position:absolute;
  top:95px;
  left:50%;
  width:16px;
  height:130px;
  margin-left:-8px;
  background:#555;
}
.base{
  position:absolute;
  bottom:5px;
  left:50%;
  width:180px;
  height:20px;
  margin-left:-90px;
  background:#555;
  border-radius:10px;
}
.pan{
  position:absolute;
  top:130px;
  width:135px;
  min-height:70px;
  background:#ffd966;
  border:4px solid #c49a00;
  border-radius:0 0 65px 65px;
  transition:.5s;
  padding:8px;
}
.left-pan{left:5px;}
.right-pan{right:5px;}
.pan-title{
  font-weight:bold;
  margin-bottom:5px;
}
.weights{
  min-height:40px;
}
.weight{
  display:inline-flex;
  justify-content:center;
  align-items:center;
  width:42px;
  height:42px;
  margin:5px;
  border-radius:50%;
  background:#4f81bd;
  color:white;
  font-weight:bold;
  font-size:18px;
  cursor:grab;
  touch-action:none;
  user-select:none;
}
.weight.x{
  background:#8e44ad;
}
.weight.negative{
  background:#d9534f;
}
.bank{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:8px;
}
.drop-hover{
  outline:4px dashed #2e9d57;
}
.message{
  font-size:20px;
  font-weight:bold;
  min-height:42px;
  margin-top:10px;
}
.success{color:#16833a;}
.fail{color:#d33;}
.info{color:#24527a;}
button{
  font-size:17px;
  padding:10px 15px;
  margin:5px;
  border:0;
  border-radius:12px;
  background:#4f81bd;
  color:white;
}
button:hover{background:#2f5d8c;}
.green{background:#2e9d57;}
.red{background:#d9534f;}
.small{
  font-size:14px;
  color:#666;
}
</style>
</head>

<body>
<div class="container">
  <h1>⚖️ 등식의 성질 드래그 저울게임</h1>

  <div class="card">
    <div class="equation" id="equationText">왼쪽 = 오른쪽</div>
    <p class="small">추를 드래그해서 왼쪽 또는 오른쪽 접시에 올려 보세요.</p>
  </div>

  <div class="card">
    <div class="scale">
      <div class="beam" id="beam"></div>
      <div class="pillar"></div>
      <div class="base"></div>

      <div class="pan left-pan" id="leftPan">
        <div class="pan-title">왼쪽</div>
        <div class="weights" id="leftWeights"></div>
      </div>

      <div class="pan right-pan" id="rightPan">
        <div class="pan-title">오른쪽</div>
        <div class="weights" id="rightWeights"></div>
      </div>
    </div>

    <div class="message info" id="message">
      같은 무게를 양쪽에 올리면 등식이 유지됩니다.
    </div>
  </div>

  <div class="card">
    <h3>🧲 추 보관함</h3>
    <div class="bank" id="bank">
      <div class="weight" data-value="1">+1</div>
      <div class="weight" data-value="2">+2</div>
      <div class="weight" data-value="3">+3</div>
      <div class="weight" data-value="5">+5</div>
      <div class="weight negative" data-value="-1">-1</div>
      <div class="weight negative" data-value="-2">-2</div>
      <div class="weight x" data-value="x">x</div>
    </div>
    <p class="small">보라색 x 추는 미지수를 의미합니다.</p>
  </div>

  <div class="card">
    <button class="green" onclick="makeExample1()">예시 1: x + 2 = 5</button>
    <button class="green" onclick="makeExample2()">예시 2: 2x + 1 = 7</button>
    <button onclick="balanceBoth(1)">양쪽에 +1 자동 추가</button>
    <button onclick="balanceBoth(-1)">양쪽에 -1 자동 추가</button>
    <button class="red" onclick="resetAll()">처음으로</button>
  </div>
</div>

<script>
let leftItems = [];
let rightItems = [];
let xValue = 3;

const bank = document.getElementById("bank");
const leftPan = document.getElementById("leftPan");
const rightPan = document.getElementById("rightPan");
const leftWeights = document.getElementById("leftWeights");
const rightWeights = document.getElementById("rightWeights");
const beam = document.getElementById("beam");
const message = document.getElementById("message");
const equationText = document.getElementById("equationText");

let dragging = null;

document.querySelectorAll(".weight").forEach(w => {
  w.addEventListener("pointerdown", startDrag);
});

function startDrag(e){
  const original = e.currentTarget;
  dragging = original.cloneNode(true);
  dragging.style.position = "fixed";
  dragging.style.zIndex = 1000;
  dragging.style.pointerEvents = "none";
  dragging.style.left = e.clientX - 21 + "px";
  dragging.style.top = e.clientY - 21 + "px";
  document.body.appendChild(dragging);

  document.addEventListener("pointermove", moveDrag);
  document.addEventListener("pointerup", endDrag);
}

function moveDrag(e){
  if(!dragging) return;
  dragging.style.left = e.clientX - 21 + "px";
  dragging.style.top = e.clientY - 21 + "px";

  leftPan.classList.remove("drop-hover");
  rightPan.classList.remove("drop-hover");

  const target = document.elementFromPoint(e.clientX, e.clientY);
  if(target && target.closest("#leftPan")) leftPan.classList.add("drop-hover");
  if(target && target.closest("#rightPan")) rightPan.classList.add("drop-hover");
}

function endDrag(e){
  if(!dragging) return;

  const value = dragging.dataset.value;
  const target = document.elementFromPoint(e.clientX, e.clientY);

  if(target && target.closest("#leftPan")){
    leftItems.push(value);
  }else if(target && target.closest("#rightPan")){
    rightItems.push(value);
  }

  dragging.remove();
  dragging = null;

  leftPan.classList.remove("drop-hover");
  rightPan.classList.remove("drop-hover");

  document.removeEventListener("pointermove", moveDrag);
  document.removeEventListener("pointerup", endDrag);

  render();
}

function itemValue(v){
  if(v === "x") return xValue;
  return Number(v);
}

function sum(items){
  return items.reduce((a,b)=>a+itemValue(b),0);
}

function display(items){
  if(items.length === 0) return "0";
  return items.map(v => v === "x" ? "x" : v).join(" + ").replace(/\+ -/g,"- ");
}

function render(){
  leftWeights.innerHTML = "";
  rightWeights.innerHTML = "";

  leftItems.forEach(v => leftWeights.appendChild(makeWeight(v)));
  rightItems.forEach(v => rightWeights.appendChild(makeWeight(v)));

  const L = sum(leftItems);
  const R = sum(rightItems);

  equationText.textContent = display(leftItems) + " = " + display(rightItems);

  if(L === R){
    beam.style.transform = "rotate(0deg)";
    leftPan.style.top = "130px";
    rightPan.style.top = "130px";
    message.textContent = "🎉 균형! 양쪽 값이 같습니다. 등식이 성립합니다.";
    message.className = "message success";
  }else if(L > R){
    beam.style.transform = "rotate(-13deg)";
    leftPan.style.top = "155px";
    rightPan.style.top = "105px";
    message.textContent = "💥 왼쪽이 더 무겁습니다. 등식이 성립하지 않습니다.";
    message.className = "message fail";
  }else{
    beam.style.transform = "rotate(13deg)";
    leftPan.style.top = "105px";
    rightPan.style.top = "155px";
    message.textContent = "💥 오른쪽이 더 무겁습니다. 등식이 성립하지 않습니다.";
    message.className = "message fail";
  }
}

function makeWeight(v){
  const d = document.createElement("div");
  d.className = "weight";
  if(v === "x") d.classList.add("x");
  if(Number(v) < 0) d.classList.add("negative");
  d.textContent = v === "x" ? "x" : (Number(v) > 0 ? "+" + v : v);
  return d;
}

function resetAll(){
  leftItems = [];
  rightItems = [];
  render();
  message.textContent = "처음 상태입니다. 추를 드래그해서 실험해 보세요.";
  message.className = "message info";
}

function makeExample1(){
  xValue = 3;
  leftItems = ["x","2"];
  rightItems = ["5"];
  render();
  message.textContent = "예시: x + 2 = 5 입니다. 여기서는 x를 3으로 생각하면 균형입니다.";
  message.className = "message info";
}

function makeExample2(){
  xValue = 3;
  leftItems = ["x","x","1"];
  rightItems = ["7"];
  render();
  message.textContent = "예시: 2x + 1 = 7 입니다. 여기서는 x를 3으로 생각하면 균형입니다.";
  message.className = "message info";
}

function balanceBoth(v){
  leftItems.push(String(v));
  rightItems.push(String(v));
  render();
  message.textContent = "양쪽에 같은 추를 올렸기 때문에 등식의 균형이 유지됩니다.";
  message.className = "message success";
}

render();
</script>
</body>
</html>
